server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    #location /soluciones-y-equipos-h-y-m/ {
    #    try_files $uri $uri/ /soluciones-y-equipos-h-y-m/index.html;
    #}

    location / {
       try_files $uri $uri/ /index.html;
    }

    # (opcional) cache para assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}